services:
  db:
    image: postgres:16-alpine
    container_name: vacmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacmatch
      POSTGRES_USER: vacmatch_user
      POSTGRES_PASSWORD: vacmatchvacmatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacmatch_user -d vacmatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vacmatch-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: change-me-in-production
      DB_NAME: vacmatch
      DB_USER: vacmatch_user
      DB_PASSWORD: vacmatchvacmatch
      DB_HOST: db
      DB_PORT: 5432
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FLASK_DEBUG: 0
    ports:
      - "5000:5000"

volumes:
  postgres_data: